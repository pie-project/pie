[package]
name = "pie-driver-abi-derive"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Derive macros for pie-driver-abi: generates the C-ABI + PyO3 surface for the rich wire types from their definitions."
license = "Apache-2.0"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"
