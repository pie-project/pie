language = "C"
pragma_once = true
cpp_compat = true
usize_is_size_t = true
no_includes = true
sys_includes = ["stddef.h", "stdint.h"]
autogen_warning = "/* Generated by pie-driver-abi-cbindgen (cbindgen). Do not edit by hand. Regenerate: cargo run -p pie-driver-abi-cbindgen */"

[parse]
parse_deps = false

[export]
exclude = [
  "DriverCapabilities",
  # Rust-side enum; the C surface is the PIE_GEOMETRY_CLASS_* macros.
  "GeometryClass",
  "KvDtype",
  "KvLayoutKind",
  "KvLayout",
  "MemoryDomain",
  "KvRegion",
  "KvHandle",
]
