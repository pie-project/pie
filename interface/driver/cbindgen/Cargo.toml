[package]
name = "pie-driver-abi-cbindgen"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Decoupled generator: emits the committed pie_driver_abi.h header from pie-driver-abi's direct local repr(C) surface via cbindgen."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[[bin]]
name = "pie-driver-abi-cbindgen"
path = "src/main.rs"

[dependencies]
cbindgen = "0.29"
