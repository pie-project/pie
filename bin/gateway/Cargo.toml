[package]
name = "pie-gateway-bin"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Pie gateway daemon — thin bin shell composing the `bootstrap` process skeleton with the `pie-gateway` role library (Seam 3 of the build/packaging refactor)."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

# Binary name is the user-facing command; the package is `pie-gateway-bin` to
# disambiguate from the `pie-gateway` role library it depends on.
[[bin]]
name = "pie-gateway"
path = "src/main.rs"

[dependencies]
# Shared process skeleton (imports as `bootstrap`): CLI flag skeleton, config
# sourcing → String, tracing + /metrics, signals/panic/exit-code lifecycle.
pie-bootstrap = { path = "../../bootstrap" }
# The gateway role library: `Config::parse` + async `run` + `GatewayHandle::shutdown`.
pie-gateway = { path = "../../gateway" }
anyhow = "1"
clap = { version = "4.6", features = ["derive"] }
# This bin owns the runtime (Model A — bootstrap is runtime-agnostic).
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
