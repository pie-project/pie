[package]
name = "pie-controller-bin"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Standalone control-plane daemon shell for Pie (bootstrap + pie-controller)."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

# Thin process shell (Seam 3): the shared `bootstrap` skeleton + the
# `pie-controller` role lib. The package is `-bin`-suffixed to avoid colliding
# with the `pie-controller` library crate; the user-facing command stays
# `pie-controller`.
[[bin]]
name = "pie-controller"
path = "src/main.rs"

[dependencies]
# Shared process skeleton (global flags, config sourcing, tracing, /metrics,
# signal/exit lifecycle). Imports as `bootstrap`.
pie-bootstrap = { path = "../../bootstrap" }
# The controller role library: `Config::parse` + async `run` + `shutdown`.
pie-controller = { path = "../../controller" }
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
