[package]
name = "pie-load-planner"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Typed weight-loading compiler for Pie runtimes."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "pie_load_planner"
crate-type = ["rlib"]
path = "src/lib.rs"

[dependencies]
half = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[dev-dependencies]
