[package]
name = "pie-grammar"
version = "0.4.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Constrained-decoding grammar engine for Pie: EBNF/regex/json-schema compilation, FSM/stack matcher, and next-token bitmask."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "pie_grammar"
path = "src/lib.rs"

[dependencies]
pie-tokenizer = { path = "../tokenizer" }
anyhow = "1.0"
lru = "0.18.1"
rustc-hash = "2.1"
serde_json = { version = "1.0", features = ["preserve_order"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "grammar"
harness = false
