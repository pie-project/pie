[package]
name = "pie-policy"
version = "0.3.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Isolated JSON proof-of-concept host for PLEX policies"
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "pie_policy"
path = "src/lib.rs"

[dependencies]
blake3 = "1.8"
pie-plex = { path = "../../interface/plex" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
wasmtime = { version = "46.0.1", features = ["pooling-allocator"] }
