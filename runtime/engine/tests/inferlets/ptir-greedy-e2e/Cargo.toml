[package]
name = "ptir-greedy-e2e"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
inferlet.workspace = true
inferlet-macros.workspace = true
# Echo's canonical PTIR container types — the guest builds the greedy_argmax
# trace and encodes the wire bytes `forward-pass.new` consumes. `eval` (the host
# interpreter) stays off; only the container/op/encode surface is used guest-side.
# NOTE: the Sampling-IR crate was renamed pie-sampling-ir -> pie-ptir (the ptir
# subtree became the whole crate); the alias keeps this manifest loadable. The
# source still needs the pie_sampling_ir::ptir::* -> pie_ptir::* rename + the
# sampling surface (A4-gated) before it builds — tracked as A3/A4 follow-up.
pie-sampling-ir = { package = "pie-ptir", path = "../../../../../interface/ptir", default-features = false, features = ["std"] }
