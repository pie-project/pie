# Test inferlets build as wasm32-wasip3 components (WASI 0.3 / Component-Model
# async). wasm32-wasip3 is a Tier-3 target: no prebuilt std (so -Zbuild-std,
# which needs the rust-src component from rust-toolchain.toml) and no bundled
# wasi-libc (so a linker wrapper supplies it).
#
# Run scripts/setup-wasip3.sh once first (installs the wasm32-wasip2 libc donor
# + the wasip3-link.sh wrapper onto PATH).
[build]
target = "wasm32-wasip3"

[unstable]
build-std = ["std", "panic_abort"]

[target.wasm32-wasip3]
linker = "wasip3-link.sh"
