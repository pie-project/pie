[package]
name = "pie-controller"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Distributed control plane for Pie"
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "pie_controller"
path = "src/lib.rs"
crate-type = ["rlib"]

# The standalone binary is auto-detected from `src/main.rs` and named after the
# package (`pie-controller`); no explicit `[[bin]]` needed.

[dependencies]
pie-schema = { path = "../protocol/schema", default-features = false }
serde = { version = "1.0", features = ["derive"] }
# tarpc is the unified control-plane RPC: workers and the gateway both dial the
# controller through the generated `ControlApiClient`. Bincode codec over either
# a TCP or a Unix-domain-socket transport (see `endpoint`).
tarpc = { version = "0.35", features = [
    "serde-transport",
    "serde-transport-bincode",
    "tcp",
    "unix",
] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time"] }
futures = "0.3"
thiserror = "2.0"
tracing = "0.1"
clap = { version = "4.5", features = ["derive"] }
