# cbindgen config for pie-schema-bindgen → protocol/schema/include/pie_schema.h
#
# Generate with: cargo run -p pie-schema-bindgen  (sets RUSTC_BOOTSTRAP=1).
# Requires cbindgen >= 0.29 (0.27 drops Rust-2024 `#[unsafe(no_mangle)]` fns).
#
# parse.expand runs `cargo expand` so the `#[schema]` proc-macro output (the
# repr(C) Pie<T>Desc mirrors) becomes visible to cbindgen — plain source parsing
# cannot see macro output (the reason the C header was hand-written historically).
#
# Post-#13 surface = Desc structs + enums + PIE_* discriminant consts ONLY (the
# in-proc Rust↔C++ hot path; C++ reads `desc->field` directly). No extern fns
# (cabi rkyv accessors dropped), no rkyv `Archived*` handles (C++ never reads rkyv).
#
# parse_deps = false (default): ALL wire types MUST be defined in-crate (pie-schema).
# A dep-sourced / re-exported type would be silently omitted from the header AND the
# regen-diff guard wouldn't fire on it — keep the surface self-contained.

language = "C++"
pragma_once = true
usize_is_size_t = true
# Suppress cbindgen's default include set; the header only uses size_t + the
# fixed-width int types. Keeps the generated header minimal.
no_includes = true
sys_includes = ["cstddef", "cstdint"]
autogen_warning = "/* Generated by pie-schema-bindgen (cbindgen). Do not edit by hand. Regenerate: cargo run -p pie-schema-bindgen */"

[parse]
parse_deps = false

[parse.expand]
crates = ["pie-schema"]   # default features (the `cabi`/`python` features are gone post-#13)

[enum]
# C-style (int-convertible) enums, NOT `enum class` — the demoted repr(u8) enums
# (PieCopyDir/PieCopyResource/PieAdapterOp) stay usable in arithmetic and ==
# comparisons without static_cast. `prefix_with_name` namespaces the variants
# (e.g. PieCopyDir_D2H) to avoid global-scope collisions.
enum_class = false
prefix_with_name = true

[export.rename]
# The 5 flat-POD types (plain source in pod.rs) carry unprefixed Rust names →
# give them the Pie<T> C names the consumers expect.
"CopyDir"        = "PieCopyDir"
"CopyResource"   = "PieCopyResource"
"AdapterOp"      = "PieAdapterOp"
"StatusResponse" = "PieStatusResponse"
"AdapterBinding" = "PieAdapterBinding"

[export]
# Post-#13 there are no extern fns referencing the Descs, so cbindgen would treat
# them as unreferenced and omit them. Explicitly list the wire-surface types so
# they're always emitted (their nested Descs/PODs/enums come along as dependencies).
include = [
  # 9 macro-emitted rich `repr(C)` Desc mirrors (PieSamplerDesc dropped in #14-P1:
  # Sampler AoS → flat SoA arrays in PieForwardRequestDesc).
  "PieFrameDesc", "PieResponseFrameDesc", "PieRequestPayloadDesc",
  "PieResponsePayloadDesc", "PieForwardRequestDesc", "PieForwardResponseDesc",
  "PieCopyRequestDesc", "PieAdapterRequestDesc", "PieBrleDesc",
  # 5 flat-POD types (plain source in pod.rs; renamed to Pie<T> above).
  "CopyDir", "CopyResource", "AdapterOp", "StatusResponse", "AdapterBinding",
]
exclude = [
  # Volatile build-script state (OUT_DIR), recomputed from schema-source content
  # on every edit. C++ never reads it (SCHEMA_HASH handshake is Rust↔Rust via the
  # shmem ring). Excluding keeps the committed header an ABI-only snapshot.
  "SCHEMA_HASH",
  # Rust-only session-message chunk size (message.rs); used by the worker's edge
  # session layer, never by C++. Exclude so the C++ header stays Desc/ABI-only.
  "CHUNK_SIZE_BYTES",
]
