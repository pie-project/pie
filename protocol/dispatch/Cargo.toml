[package]
name = "pie-dispatch"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Gateway data-plane RPC contract: the `GatewayInbound` (gateway-served) + `WorkerControl` (worker-served) tarpc services that ride one worker→gateway connection, plus the shared two-way mux glue that splits that one connection into both. Deps are pie-schema + tarpc and tarpc-transitive foundations (serde/futures/tokio/thiserror/tracing) only — zero internal pie edges, so the pie-schema floor stays tarpc-free."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "pie_dispatch"
path = "src/lib.rs"

[dependencies]
# Wire data types (static serde structs on the dependency floor).
pie-schema = { path = "../schema" }
# The RPC mechanism. `serde1` enables the serde derives on the macro-generated
# request/response types; `tokio1` enables `NewClient::spawn` (just `tokio/rt`,
# used by the typed link constructors). Transport/codec features (serde-transport
# /tcp/unix) stay with the binaries (gateway/worker) so the contract crate
# carries no transport.
tarpc = { version = "0.35", features = ["serde1", "tokio1"] }
# Foundations for the shared two-way mux glue (`spawn_twoway` + the typed link
# constructors). All tarpc-transitive — they add no new crates to the graph and
# no internal pie edge beyond `pie-schema`, so the floor-purity invariant holds.
serde = { version = "1.0", features = ["derive"] } # derive on `TwoWayMessage`
futures = "0.3"                                     # Stream/Sink combinators + Abortable
tokio = { version = "1", features = ["rt"] }        # spawn the two pump tasks
thiserror = "2"                                     # the mux error enum
tracing = "0.1"                                     # warn on inbound-mux failure
