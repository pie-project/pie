[package]
name = "inferlet"
version = "0.4.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Inferlet support library for Pie"
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"
keywords = ["wasi", "wasm", "pie", "inferlet"]
categories = ["wasm"]

[dependencies]
wit-bindgen = "0.57.1"
wstd = "0.5.6"
trait-variant = "0.1.2"
wasi = "0.14.7"
inferlet-macros = { version = "0.4.0", path = "../inferlet-macros" }
futures = "0.3.31"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "0.8"
pico-args = "0.5"
sampling-edsl = { path = "../sampling-edsl", default-features = false }

[features]
# WS5 de-hardwiring: route the ergonomic `Sampler` enum through the Sampling-IR
# (lower to an IR program via `sampling-edsl::sugar`) instead of the hardwired
# WIT `sampler` variant. Off by default until the IR-JIT path is parity- and
# perf-gated against the legacy CUDA kernels (hotel's removal gate). The
# `Sampler::lower` / `SamplerSpec` bridge is always available; this flag gates
# the in-loop swap.
ir-sampler = []
