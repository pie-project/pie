[package]
name = "pie-plex-sdk"
version = "0.6.0"
edition = "2024"
authors = ["In Gim <in.gim@yale.edu>"]
description = "Typed Rust SDK for PLEX v0.6 policies"
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "plex"
path = "src/lib.rs"
crate-type = ["rlib"]

[dependencies]
pie-plex = { path = "../../../interface/plex" }
serde_json = "1.0"
wit-bindgen = "0.58.0"
