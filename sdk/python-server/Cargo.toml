[package]
name = "pie-server-py"
version = "0.4.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Python bindings for the pie engine — embed `pie serve` inside a Python script via `pie.server.Server`."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[features]
profile-fire = ["pie-worker/profile-fire"]

[lib]
name = "pie_engine"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# `pie-worker` is the engine library — we link the same `serve::start_engine`
# the CLI uses, so the CLI and the pyo3 wheel can never drift in their boot
# behavior. Build the embedded drivers into the Python engine so
# `pie.server.Server` can host the same local flavors as `pie serve`
# (`driver-metal` is added on Apple-Silicon builds).
pie-worker = { path = "../../worker", default-features = false, features = ["driver-cuda", "driver-dummy"] }
pyo3 = { version = "0.29", features = ["extension-module"] }
tokio = { version = "1.53", features = ["rt-multi-thread"] }
toml = "1.1"
anyhow = "1.0"
