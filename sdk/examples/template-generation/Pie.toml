[package]
name = "template-generation"
version = "0.1.0"
description = "Template-driven generation using minijinja for structured rendering"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
prompt = {type = "string", optional = true, description = "The product/topic to generate content for (default: an AI-powered code editor)"}
max_retries = {type = "int", optional = true, description = "Maximum generation/render retry cycles (default: 3)"}
max_tokens = {type = "int", optional = true, description = "Max tokens per generation attempt (default: 1024)"}
