[package]
name = "json-schema-validation"
version = "0.1.0"
description = "JSON Schema-validated generation with iterative refinement using jsonschema"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
prompt = {type = "string", optional = true, description = "The prompt describing what JSON to generate (default: person profile)"}
max_retries = {type = "int", optional = true, description = "Maximum number of validation/retry cycles (default: 3)"}
max_tokens = {type = "int", optional = true, description = "Max tokens per generation attempt (default: 512)"}
