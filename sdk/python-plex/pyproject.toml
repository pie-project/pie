[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "pie-plex"
version = "0.6.0"
description = "Embed the PLEX serving-policy runtime in Python engines."
readme = { text = "Python host binding for the PLEX serving-policy runtime.", content-type = "text/plain" }
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [{ name = "In Gim", email = "in.gim@icloud.com" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
test = ["pytest>=8,<9"]

[tool.maturin]
python-source = "python"
python-packages = ["pie_plex"]
module-name = "pie_plex._native"
manifest-path = "Cargo.toml"

[tool.pytest.ini_options]
testpaths = ["tests"]
