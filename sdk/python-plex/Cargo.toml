[package]
name = "pie-plex-py"
version = "0.5.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Python host binding for the PLEX policy runtime"
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[lib]
name = "_native"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
pie-policy = { path = "../../runtime/policy" }
pyo3 = { version = "0.29", features = ["extension-module"] }
serde_json = "1.0"
