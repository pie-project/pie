[package]
name = "text-completion-bench"
version = "0.1.0"
description = "Text completion inferlet for benchmarking — emits exact token counts in the Return event, no per-token streaming, so harness can do apples-to-apples accounting against vllm/sglang."
authors = ["pie-project"]
repository = "https://github.com/pie-project/pie"
readme = "README.md"

[runtime]
core = "^0.2.0"

[parameters]
prompt = {type = "string", description = "The user message to complete"}
system = {type = "string", optional = true, description = "System prompt"}
max_tokens = {type = "int", optional = true, description = "Max generated tokens (default: 256)"}
temperature = {type = "float", optional = true, description = "Sampling temperature (default: 0.6)"}
top_p = {type = "float", optional = true, description = "Top-p (default: 0.95)"}
ignore_eos = {type = "bool", optional = true, description = "Ignore stop tokens — generate exactly max_tokens (default: false)"}
