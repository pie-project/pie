[package]
name = "demo-parallel-fork"
version = "0.1.1"
description = "Demo: best-of-N via Context::fork() — 1 shared prefill + N parallel decodes vs N independent prefills (uniquely Pie)"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
mode = {type = "string", optional = true, description = "'baseline' | 'forked' | 'both' — pick one for side-by-side recording (default: 'both')"}
question = {type = "string", optional = true, description = "Math word problem (default: a 4-step train problem)"}
expected = {type = "string", optional = true, description = "Expected final answer for the verdict line (default: '12:45')"}
num_forks = {type = "int", optional = true, description = "How many parallel candidates to draw (default: 4)"}
max_tokens = {type = "int", optional = true, description = "Max tokens per candidate (default: 220)"}
temperature = {type = "float", optional = true, description = "Sampling temperature for the candidates (default: 0.7)"}
delay = {type = "int", optional = true, description = "Per-token delay in ms — slows the stream so the visual is readable on video (default: 0)"}
