[package]
name = "demo-watermark"
version = "0.1.1"
description = "Demo: per-token green-list watermark via Probe::Distribution + in-WASM bias — output is verifiably signed (uniquely Pie)"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"

[parameters]
mode = {type = "string", optional = true, description = "'baseline' | 'watermarked' | 'both' — pick one for side-by-side recording (default: 'both')"}
prompt = {type = "string", optional = true, description = "User prompt (default: a brief explanation of LLM decoding)"}
max_tokens = {type = "int", optional = true, description = "Max tokens to generate (default: 80)"}
gamma = {type = "float", optional = true, description = "Fraction of vocabulary in the green list (default: 0.5)"}
delta = {type = "float", optional = true, description = "Bias added to green-list logits (default: 8.0)"}
delay = {type = "int", optional = true, description = "Per-token delay in ms — slows the stream so the visual is readable on video (default: 0)"}
