[package]
name = "json-schema-validation"
version = "0.1.1"
description = "Grammar-constrained JSON generation against a runtime-string JSON schema"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"

[parameters]
prompt = {type = "string", optional = true, description = "Description of what to generate"}
max_tokens = {type = "int", optional = true, description = "Max generation tokens (default: 512)"}
