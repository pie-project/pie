[package]
name = "image-qa"
version = "0.1.0"
description = "Image question-answering (multimodal) — encode an image and answer a question about it"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
image_url = {type = "string", optional = true, description = "URL of the image to ask about"}
question = {type = "string", optional = true, description = "Question to ask about the image"}
system = {type = "string", optional = true, description = "System prompt"}
max_tokens = {type = "int", optional = true, description = "Max tokens to generate (default: 128)"}
temperature = {type = "float", optional = true, description = "Sampling temperature (default: 0.7)"}
