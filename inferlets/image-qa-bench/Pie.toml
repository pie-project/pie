[package]
name = "image-qa-bench"
version = "0.1.0"
description = "Image QA inferlet for benchmarking — base64 image in, exact prompt/output token counts out (incl. image soft tokens), ignore_eos for apples-to-apples accounting vs vLLM."
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"

[parameters]
image_b64 = {type = "string", description = "Base64-encoded image bytes (PNG/JPEG). Host decodes + preprocesses + vision-encodes."}
question = {type = "string", optional = true, description = "Question to ask about the image"}
system = {type = "string", optional = true, description = "System prompt"}
max_tokens = {type = "int", optional = true, description = "Max generated tokens (default: 128)"}
temperature = {type = "float", optional = true, description = "Sampling temperature; <=0 uses Argmax (default: 0.0)"}
top_p = {type = "float", optional = true, description = "Top-p (default: 1.0)"}
ignore_eos = {type = "bool", optional = true, description = "Ignore stop tokens — generate exactly max_tokens (default: false)"}
return_text = {type = "bool", optional = true, description = "Decode and return generated text (default: true)"}
