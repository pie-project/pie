[package]
name = "demo-self-correct"
version = "0.1.2"
description = "Demo: self-correcting math via co-located verifier + Context::snapshot/take rewind (uniquely Pie)"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"
mcp = "^0.2.0"

[parameters]
mode = {type = "string", optional = true, description = "'baseline' | 'verified' | 'both' — pick one for side-by-side recording (default: 'both')"}
question = {type = "string", optional = true, description = "Math problem (default: a 5-step computation)"}
expected = {type = "string", optional = true, description = "Expected final answer for the verdict line (default: '1072')"}
max_tokens = {type = "int", optional = true, description = "Max tokens per attempt (default: 250)"}
max_retries = {type = "int", optional = true, description = "Max retries in SMART mode (default: 5)"}
delay = {type = "int", optional = true, description = "Per-token delay in ms — slows the stream so the visual is readable on video (default: 0)"}
