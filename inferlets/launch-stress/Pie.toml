[package]
name = "launch-stress"
version = "0.1.0"
description = "Stress / corner-case driver for the runtime::launch API. Single binary that acts as either caller or callee depending on role."
authors = ["In Gim <in.gim@yale.edu>"]
repository = "https://github.com/pie-project/pie"

[runtime]
core = "^0.2.0"

[parameters]
role = {type = "string", description = "'caller' or 'callee'"}
scenario = {type = "string", optional = true, description = "(caller) which scenario to run"}
callee = {type = "string", optional = true, description = "(caller) name@version of the callee inferlet"}
n = {type = "int", optional = true, description = "(caller) numeric parameter for scenarios that need one"}
directive = {type = "string", optional = true, description = "(callee) what to do"}
payload = {type = "string", optional = true, description = "(callee) input"}
err_msg = {type = "string", optional = true, description = "(callee) error string for the 'err' directive"}
notify_topic = {type = "string", optional = true, description = "(callee) optional topic to push a side-channel notification on"}
