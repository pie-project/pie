[package]
name = "audio-qa"
version = "0.1.0"
description = "Audio question-answering (multimodal) — encode an audio clip and answer a question about it"
authors = ["Pie Team"]

[runtime]
core = "^0.2.0"

[parameters]
audio_url = {type = "string", optional = true, description = "URL of the audio clip (WAV) to ask about"}
question = {type = "string", optional = true, description = "Question to ask about the audio"}
system = {type = "string", optional = true, description = "System prompt"}
max_tokens = {type = "int", optional = true, description = "Max tokens to generate (default: 128)"}
temperature = {type = "float", optional = true, description = "Sampling temperature (default: 0.7)"}
