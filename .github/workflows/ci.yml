name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  workspace-check:
    name: cargo check / test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cheap structural check: every workspace member compiles. Skips
      # the cmake-driven C++ build by checking pie-worker with
      # `--no-default-features` (the default features pull in ggml).
      - name: cargo check (runtime, client, no-driver pie-worker)
        run: |
          cargo check -p pie
          cargo check -p pie --no-default-features
          cargo check -p pie-client

      - name: cargo test (runtime, client)
        run: |
          cargo test -p pie --lib
          cargo test -p pie-client --lib

  # Full-workspace verification — the guardrail + anti-bitrot net. Closes the
  # gap that let the runtime benches rot unseen: the dedicated jobs only build a
  # curated subset, so new crates (`pie-transport`) and the benches were
  # compiled by nothing. This job compiles EVERY target and runs the workspace
  # test set.
  #
  #   --exclude pie-server-py : links driver-cuda (needs nvcc) → cuda job only.
  #   --exclude pie-worker (workspace test step): pie-worker's `--bin pie` tests
  #     need a driver feature (dummy/metal/cuda) and are exercised by the four
  #     dedicated jobs below. Its *library* tests are pure-Rust (default
  #     features = no cmake/cuda) and ARE run here explicitly via the
  #     `cargo test -p pie-worker --lib` step so worker library test-rot is
  #     caught in the full battery — those lib tests previously ran in NO job at
  #     all. (The two former failures — the filesystem-coupled
  #     `translate::translates_minimal_config` and
  #     `config::rejects_public_driver_capacity_knobs` — are now fixed, so the
  #     exclusion no longer applies to `--lib`.)
  workspace-verify:
    name: workspace verify (all crates + all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build ccache

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # rust-toolchain.toml pins the wasip3 nightly; this installs the Tier-3
      # wasm32-wasip3 build prereqs (wasm32-wasip2 libc donor + linker wrapper)
      # so the runtime integration tests can build their wasip3 inferlets.
      - name: Set up wasm32-wasip3 toolchain
        run: ./scripts/setup-wasip3.sh

      - name: Cache cargo + cmake build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/ccache
            target
          key: ${{ runner.os }}-workspace-verify-${{ hashFiles('**/Cargo.lock', 'driver/**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-workspace-verify-

      # Compile every target — including benches and the not-yet-consumed
      # data-plane crate `pie-transport` — so they cannot silently bitrot.
      - name: cargo build (workspace, all targets)
        run: cargo build --workspace --all-targets --exclude pie-server-py

      # Run the workspace test set (benches are compiled above, not executed).
      # pie-worker's library tests are pure-Rust, so run them explicitly here to
      # keep worker test-rot inside the full battery; its `--bin pie` tests need
      # a driver feature and stay in the dedicated jobs below.
      - name: cargo test (workspace + pie-worker lib)
        run: |
          cargo test --workspace --exclude pie-server-py --exclude pie-worker
          cargo test -p pie-worker --lib

  # Drift guard for the committed C++ driver ABI header: regenerate it with
  # pie-driver-abi-cbindgen (cbindgen over pie-driver-abi's repr(C)/cabi surface)
  # and fail if it differs from the committed copy. Complements the runtime
  # SCHEMA_HASH handshake. Toolchain is PINNED (not @stable) because cbindgen's
  # parse.expand output is toolchain-dependent — pinning keeps the diff stable.
  schema-header-drift:
    name: schema header drift (cbindgen regen)
    runs-on: ubuntu-latest
    # Pinned to stable 1.91.1 for deterministic cbindgen parse.expand output.
    # RUSTUP_TOOLCHAIN is forced here so the repo-wide nightly rust-toolchain.toml
    # (wasip3 epic) does NOT override the dtolnay-installed 1.91.1 in this job.
    env:
      RUSTUP_TOOLCHAIN: "1.91.1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (pinned for deterministic expansion)
        uses: dtolnay/rust-toolchain@1.91.1

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-schema-bindgen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-schema-bindgen-

      - name: Regenerate committed driver ABI header
        # RUSTC_BOOTSTRAP=1 is set inside the generator; cbindgen is a dep of
        # pie-driver-abi-cbindgen, so no separate install is needed.
        run: cargo run -p pie-driver-abi-cbindgen

      - name: Fail if committed pie_driver_abi.h is stale
        run: |
          if ! git diff --exit-code -- interface/driver/include/pie_driver_abi.h; then
            echo "::error::interface/driver/include/pie_driver_abi.h is out of date."
            echo "Regenerate with: cargo run -p pie-driver-abi-cbindgen   (then commit)"
            exit 1
          fi

  # WIT drift — the canonical inferlet interface (interface/inferlet) is
  # vendored into two SDK copies (sdk/rust/inferlet/wit,
  # sdk/tools/bakery/src/bakery/wit). Manual three-way editing has regressed
  # twice (commit 94043eb1). scripts/sync-wit.sh regenerates the copies from
  # source; this job fails if a PR edited the interface without re-syncing.
  wit-drift:
    name: wit drift (sync-wit.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install wit-deps
        run: cargo install --locked wit-deps-cli

      - name: Regenerate vendored WIT copies
        run: ./scripts/sync-wit.sh

      - name: Fail if vendored WIT copies are stale
        run: |
          if ! git diff --exit-code -- sdk/rust/inferlet/wit sdk/tools/bakery/src/bakery/wit; then
            echo "::error::Vendored WIT copies are out of sync with interface/inferlet."
            echo "Regenerate with: ./scripts/sync-wit.sh   (then commit)"
            exit 1
          fi

  # Dummy driver — pure Rust, builds on every OS we support. Cheapest
  # gate for "did the standalone wiring break end to end". Runs the
  # full unit-test suite too since dummy doesn't pull in cmake.
  pie-worker-dummy:
    name: pie-worker (driver-dummy)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pie-worker-dummy-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo build (driver-dummy)
        run: |
          cargo build -p pie-worker \
            --no-default-features --features driver-dummy

      - name: cargo test (pie-worker, dummy)
        run: |
          cargo test -p pie-worker --bin pie \
            --no-default-features --features driver-dummy

  # macOS Metal driver build. Verifies driver/metal's cmake + link
  # path (libomp) so PRs that touch driver/metal or build.rs fail fast
  # on macOS. Doesn't run against a real model — just exercises the
  # cmake + link path.
  pie-worker-metal:
    name: pie-worker (driver-metal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake ninja ccache libomp

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + cmake build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/Library/Caches/ccache
            target
          key: ${{ runner.os }}-pie-worker-metal-${{ hashFiles('**/Cargo.lock', 'driver/metal/CMakeLists.txt') }}

      - name: cargo build (driver-metal)
        run: cargo build -p pie-worker --no-default-features --features driver-metal

      - name: cargo test (pie-worker)
        run: cargo test -p pie-worker --bin pie --no-default-features --features driver-metal

      - name: Native Metal entrypoint validation
        run: |
          cmake -S driver/metal -B target/metal-validation -G Ninja \
            -DPIE_METAL_WITH_MLX=OFF \
            -DPIE_METAL_BUILD_STUB_TESTS=ON
          cmake --build target/metal-validation --target metal_direct_stub_test
          ctest --test-dir target/metal-validation \
            --output-on-failure -R '^metal_direct_stub_test$'

  # Cuda build — runs only when an opt-in label or schedule fires
  # (no CUDA on the default GH-hosted runners). Add a self-hosted
  # runner with a CUDA toolkit to enable this. Until then, M3's
  # static-link spike + manual M4 verification are the canonical
  # checkpoints.
  pie-worker-cuda:
    name: pie-worker (driver-cuda)
    runs-on: [self-hosted, cuda]
    if: contains(github.event.pull_request.labels.*.name, 'ci-cuda')
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo build (driver-cuda)
        run: |
          cargo build -p pie-worker \
            --no-default-features --features driver-cuda

      - name: Native CUDA entrypoint validation
        run: |
          CUDA_BUILD_DIR="$(find target/debug/build -type d \
            -path '*/out/cuda/build' -print -quit)"
          test -n "$CUDA_BUILD_DIR"
          cmake --build "$CUDA_BUILD_DIR" \
            --target test_entry_validation test_ptir_dispatch_bind
          ctest --test-dir "$CUDA_BUILD_DIR" --output-on-failure \
            -R '^(entry_validation|ptir_dispatch_bind)$'

      - name: Verify no CUDA shared deps
        run: |
          ldd target/debug/pie
          ldd target/debug/pie | grep -E "libcudart|libcublas|libcublasLt" \
            && { echo "FAIL: CUDA shared lib leaked into binary"; exit 1; } \
            || echo "OK: no CUDA shared deps"
