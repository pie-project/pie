name: Release npm Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        type: choice
        options:
          - pie-client (client/javascript/)
          - inferlet (sdk/javascript/)
      dry_run:
        description: 'Dry run (build but do not publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Determine package path
        id: info
        run: |
          case "${{ inputs.package }}" in
            "pie-client (client/javascript/)")
              echo "path=client/javascript" >> $GITHUB_OUTPUT
              ;;
            "inferlet (sdk/javascript/)")
              echo "path=sdk/javascript" >> $GITHUB_OUTPUT
              ;;
          esac
      
      - name: Install dependencies
        working-directory: ${{ steps.info.outputs.path }}
        run: npm ci
      
      - name: Build
        working-directory: ${{ steps.info.outputs.path }}
        run: npm run build --if-present

      - name: Test
        if: steps.info.outputs.path == 'client/javascript'
        working-directory: ${{ steps.info.outputs.path }}
        run: npm test

      - name: Dry run - publish
        if: inputs.dry_run == true
        working-directory: ${{ steps.info.outputs.path }}
        run: |
          set +e
          npm publish --dry-run --access public 2>&1 | tee "$RUNNER_TEMP/npm-publish-dry-run.log"
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -ne 0 ] && ! grep -q "previously published versions" "$RUNNER_TEMP/npm-publish-dry-run.log"; then
            exit "$status"
          fi
      
      - name: Publish to npm
        if: inputs.dry_run == false
        working-directory: ${{ steps.info.outputs.path }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
