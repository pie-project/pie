[package]
name = "pie-standalone"
version = "0.1.0"
edition = "2024"
authors = ["In Gim <in.gim@icloud.com>"]
description = "Standalone Pie server (no Python). Embeds a native driver in-process."
license = "Apache-2.0"
repository = "https://github.com/pie-project/pie"

[[bin]]
name = "pie"
path = "src/main.rs"

[features]
# Default to portable until cuda support lands in M3/M4.
default = ["driver-portable"]
# Mutually exclusive — see workspace docs in Cargo.toml at repo root.
driver-portable = []
driver-cuda = []
# Rust dummy driver — random tokens, no model load. Useful for plumbing
# tests and the macOS dev loop where the C++ drivers don't build.
driver-dummy = ["dep:pie-driver-dummy"]

[dependencies]
# `pie` is the runtime crate. We disable the default `python` feature so
# pyo3 stays out of our dep graph — server/standalone is meant to be
# Python-free.
pie = { path = "../../runtime", default-features = false }
anyhow = "1.0"
rmp-serde = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.9"
tokio = { version = "1.38", features = ["full"] }
tracing = "0.1"
# HuggingFace snapshot resolver. Same `~/.cache/huggingface/hub/` layout
# the Python `huggingface_hub` package uses, so models downloaded by
# either path are interchangeable.
hf-hub = "1.0.0-rc.0"
# `shm_unlink` for the hard-kill cleanup path; see serve.rs's shutdown
# branch. Drivers normally clean up on graceful exit, but a SIGKILL
# leaves the POSIX shmem region behind — we call shm_unlink directly
# so the next launch doesn't trip on a stale segment.
libc = "0.2"
# CLI subcommand parsing — mirrors the Python pie_cli surface.
clap = { version = "4.5", features = ["derive"] }
# Local-time formatter for `pie auth add`'s default key-name timestamp,
# matching the Python wrapper's `%Y-%m-%d-%H:%M:%S` shape.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# Python WASM runtime install (M8). The runtime tarball at
# `registry.pie-project.org/api/v1/runtimes/python3.14/.../download` is
# xz-compressed tar; `xz2` decompresses, `tar` extracts. `reqwest` is
# already in the dep tree (transitively via the runtime crate); we
# pin it directly here to make the dep explicit and pull in `blocking`.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking", "stream"] }
tar = "0.4"
xz2 = "0.1"

# Live TUI monitor (M10). ratatui + crossterm match the conventional
# pairing; nvml-wrapper feeds the GPU panel from libnvidia-ml.so when
# present (gracefully absent on macOS / non-NVIDIA hosts).
ratatui = "0.30"
crossterm = "0.29"
nvml-wrapper = "0.12"

# Optional Rust drivers. The static lib is pulled in only when the matching
# `driver-*` feature is enabled.
pie-driver-dummy = { path = "../../driver/dummy", optional = true }

# Pie websocket client — used by `pie run` to drive an inferlet against
# the engine subprocess we boot. Same crate the dummy_roundtrip example
# uses.
pie-client = { path = "../../client/rust" }

[dev-dependencies]
tempfile = "3"

[build-dependencies]
cmake = "0.1"
