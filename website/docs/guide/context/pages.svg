<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 192" width="720" height="192" role="img" aria-labelledby="pg-title pg-desc">
  <title id="pg-title">Page chain: three committed pages and one working page</title>
  <desc id="pg-desc">A context's KV cache is a chain of fixed-size pages. Pages 0, 1, and 2 are committed (full and immutable). Page 3 is the working page (partial, currently being written to).</desc>

  <style>
    text  { font-family: 'IBM Plex Serif', Charter, Georgia, serif; font-size: 13px; }
    .ink { fill: #2c2722; }
    .sub { fill: #54473b; }
  </style>

  <!-- Page 0 -->
  <rect x="60" y="24" width="132" height="96" rx="8" ry="8"
        fill="#fdfbf3" stroke="#54473b" stroke-width="1.5"/>
  <text class="ink" x="126" y="66" text-anchor="middle">Page 0</text>
  <text class="sub" x="126" y="86" text-anchor="middle">(full)</text>
  <text class="sub" x="126" y="144" text-anchor="middle">committed</text>

  <!-- Page 1 -->
  <rect x="216" y="24" width="132" height="96" rx="8" ry="8"
        fill="#fdfbf3" stroke="#54473b" stroke-width="1.5"/>
  <text class="ink" x="282" y="66" text-anchor="middle">Page 1</text>
  <text class="sub" x="282" y="86" text-anchor="middle">(full)</text>
  <text class="sub" x="282" y="144" text-anchor="middle">committed</text>

  <!-- Page 2 -->
  <rect x="372" y="24" width="132" height="96" rx="8" ry="8"
        fill="#fdfbf3" stroke="#54473b" stroke-width="1.5"/>
  <text class="ink" x="438" y="66" text-anchor="middle">Page 2</text>
  <text class="sub" x="438" y="86" text-anchor="middle">(full)</text>
  <text class="sub" x="438" y="144" text-anchor="middle">committed</text>

  <!-- Page 3 (working) -->
  <rect x="528" y="24" width="132" height="96" rx="8" ry="8"
        fill="#fdfbf3" stroke="#54473b" stroke-width="1.5"/>
  <text class="ink" x="594" y="66" text-anchor="middle">Page 3</text>
  <text class="sub" x="594" y="86" text-anchor="middle">(partial)</text>
  <text class="sub" x="594" y="144" text-anchor="middle">working</text>
</svg>
