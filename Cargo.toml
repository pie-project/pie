# Top-level Cargo workspace for the host-side Rust crates.
#
# Members are the crates that build for the host (Linux/macOS x86_64/aarch64).
# Wasm-target crates (`inferlets/*`, `sdk/rust/*`) are intentionally excluded —
# they have their own Cargo.lock files and target `wasm32-wasip2`, so mixing
# them into this workspace's resolver would pull wasm-only deps into the host
# build graph.
[workspace]
resolver = "2"
members = [
    "runtime",
    "client/rust",
    "server",
    "driver/dummy",
    "sdk/python-rpc",
    "sdk/python-server",
]
exclude = [
    "inferlets",
    "sdk/rust",
]

# Distribution profile for `pie-standalone`. Trades build time for
# binary size: full LTO, single codegen unit, abort-on-panic
# (no unwinder + smaller .eh_frame), all symbols stripped. Use
# `cargo build --profile release-min -p pie-standalone --release`.
# The regular `release` profile stays as the default dev/bench path.
[profile.release-min]
inherits = "release"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
