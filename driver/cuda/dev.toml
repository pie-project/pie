# Sample driver/cuda config. Pass via `pie_driver_cuda --config dev.toml`.

[model]
snapshot_dir = "/path/to/local/model"
device = "cuda:0"
dtype = "bfloat16"

# Memory planner. Manual batch/KV sizing is derived at startup after
# weights load.
[batching]
gpu_mem_utilization = 0.90
memory_profile = "balanced"
