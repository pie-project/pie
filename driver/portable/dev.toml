# Sample portable-driver config. Pass via `pie_driver_portable --config dev.toml`.

# Shmem IPC channel — must match the runtime's `[model.<name>.driver]` config.
[shmem]
# Hardcoded across the stack (runtime/src/device.rs).
name = "/pie_shmem"
num_slots = 8
req_buf = 4194304   # 4 MiB
resp_buf = 1048576  # 1 MiB
spin_us = 0         # 0 = pure busy spin

[model]
# Path to a HuggingFace snapshot directory. The Python wrapper (pie_driver_portable)
# resolves `hf_repo` to a local snapshot via the standard hub cache before
# spawning this binary; for local dev, point directly at the snapshot.
hf_path = "/path/to/huggingface/snapshot"
# 0 = CPU only, -1 = offload all layers to GPU, N = first N layers on GPU.

# KV cache, page size, and forward limits are derived at startup and reported
# in the READY capabilities. The runtime then hands us `kv_page_indices` per
# request in every wire payload; we honor them.
