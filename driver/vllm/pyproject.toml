[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pie-driver-vllm"
version = "0.3.0"
description = "Pie driver — vLLM backend. Uses vllm's model definitions and kernels under pie's RPC surface."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [{ name = "In Gim", email = "in.gim@icloud.com" }]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# vLLM 0.21.0 pins torch 2.11 + CUDA 13-era wheels and expects the
# FlashInfer 0.6.8 family. The two Python accelerated drivers remain
# independent wheels; separate venvs are the supported deployment path.
dependencies = [
    # `pie-bridge` is the PyO3 wheel that ships the canonical wire schema,
    # Method enum, DriverCapabilities, and ShmemServer (single source of
    # truth, mirrored from Rust). Per-driver scaffolding lives under
    # `pie_driver_vllm._bridge` as a vendored copy of the legacy
    # `._bridge` Python.
    "pie-bridge",
    "pie-driver-dev",
    "msgpack>=0.5",
    "msgspec>=0.18",
    "numba>=0.61,<0.66",
    "opentelemetry-api>=1.20",
    # `psutil` is imported by `utils.get_available_memory` (RAM probe).
    "psutil>=5.9",
    "torch==2.11.0",
    "torchvision==0.26.0",
    "torchaudio==2.11.0",
    "torchao==0.9.0",
    "vllm==0.21.0",
    "flashinfer-python==0.6.8.post1",
    "flashinfer-cubin==0.6.8.post1",
    "flashinfer-jit-cache==0.6.8.post1",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "flashinfer-cu128"
url = "https://flashinfer.ai/whl/cu128"
explicit = true

[tool.uv.sources]
pie-bridge = { path = "../bridge", editable = true }
pie-driver-dev = { path = "../dev", editable = true }
flashinfer-jit-cache = [{ index = "flashinfer-cu128" }]

[tool.uv]
# Resolve the structured-decoding pins where vLLM 0.21.0 and SGLang 0.5.9
# disagree. Only matters when both wheels share a venv (separate venvs is
# the supported deployment, in which case this block is inert).
# Note: `uv pip install` does not honor this block; only `uv lock` /
# `uv sync` do. Shared-venv users should drive install via uv sync, or
# pass these as `--override` to uv pip install.
override-dependencies = [
    "llguidance>=1.3.0,<1.4.0",
    "xgrammar==0.1.29",
    "outlines-core==0.2.11",
    "outlines>=1.2.0,<1.3.0",
]

[tool.setuptools]
package-dir = { "" = "src" }
packages = ["pie_driver_vllm", "pie_driver_vllm._bridge"]
